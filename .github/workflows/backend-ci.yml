name: Backend CI

on:
  push:
    branches: [main, development]
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, development]
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/backend/DashTab.sln

      - name: Build
        run: dotnet build src/backend/DashTab.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/backend/DashTab.sln --configuration Release --verbosity minimal
