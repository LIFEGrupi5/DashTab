services:

  # ── Databases ───────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: [backend, full]
    environment:
      POSTGRES_USER: dashtab
      POSTGRES_PASSWORD: dashtab_secret
      POSTGRES_DB: dashtab
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashtab"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: [backend, full]
    command: redis-server --requirepass redis_secret
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Identity ─────────────────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    restart: unless-stopped
    profiles: [full]
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: dashtab
      KC_DB_PASSWORD: dashtab_secret
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_secret
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Backend (.NET 10) ────────────────────────────────────────────────────────

  backend:
    build:
      context: ../../src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: [backend, full]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=dashtab;Username=dashtab;Password=dashtab_secret"
      ConnectionStrings__Redis: "redis:6379,password=redis_secret"
      Keycloak__Authority: "http://keycloak:8080/realms/dashtab"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────

  frontend:
    build:
      context: ../../src/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: [full]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost/auth
      NEXT_PUBLIC_KEYCLOAK_REALM: dashtab
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: dashtab-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Reverse Proxy ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles: [full]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - keycloak

  # ── Observability ─────────────────────────────────────────────────────────────

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    profiles: [observability, full]
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    profiles: [observability, full]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: grafana_secret
      GF_SERVER_ROOT_URL: http://localhost/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      loki:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:
