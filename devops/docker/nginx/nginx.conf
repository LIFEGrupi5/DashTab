events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s;

  server {
    listen 80;

    # Frontend
    location / {
      set $upstream_frontend http://frontend:3000;
      proxy_pass         $upstream_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # Backend API — strip /api prefix before forwarding
    location /api/ {
      set $upstream_backend http://backend:5000;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass         $upstream_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Keycloak — Keycloak 25 serves at /, strip /auth prefix
    location /auth/ {
      set $upstream_keycloak http://keycloak:8080;
      rewrite ^/auth/(.*)$ /$1 break;
      proxy_pass         $upstream_keycloak;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_buffer_size  128k;
      proxy_buffers      4 256k;
    }

    # Grafana — served at /grafana/ sub-path, pass full path through
    location /grafana/ {
      set $upstream_grafana http://grafana:3000;
      proxy_pass         $upstream_grafana;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }
  }
}
